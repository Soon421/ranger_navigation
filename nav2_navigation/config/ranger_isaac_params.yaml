# =============================================================================
# Nav2 Parameters for Ranger Mini (Dual Ackermann) - Isaac Sim (PointCloud2)
# =============================================================================

# -----------------------------------------------------------------------------
# Behavior Tree Navigator - Manages navigation behavior tree execution
# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/imu
    bt_loop_duration: 10              # ms
    default_server_timeout: 20        # sec
    wait_for_service_timeout: 1000    # ms

# -----------------------------------------------------------------------------
# Controller Server - Executes local trajectory tracking
# -----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    controller_frequency: 10.0          # Hz
    min_x_velocity_threshold: 0.001     # m/s
    min_y_velocity_threshold: 0.001     # m/s  (Ackermann은 body-y 속도 없음, 임계값만 정상화)
    min_theta_velocity_threshold: 0.001 # rad/s
    failure_tolerance: 0.3              # sec
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker - Detects if robot is stuck
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3   # m
      movement_time_allowance: 15.0   # sec

    # Goal checker - Determines when goal is reached
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35         # m  (Ackermann 강제로 정밀 yaw 어려워 완화)
      yaw_goal_tolerance: 0.35        # rad (≈ 20°)

    # RotationShimController - 큰 heading 오차(예: 180° 뒤 goal) 시 제자리 회전으로
    # 경로 방향에 먼저 정렬한 뒤 MPPI로 인계. ranger_base는 pure rotation을
    # SPINNING 모드로 처리하므로 Ackermann 3-point-turn 없이 자연스럽게 선회함.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.785        # rad(45°). 경로 시작 heading 오차가 이보다 크면 제자리 회전 트리거
      forward_sampling_distance: 0.5       # m. 경로 위 이 거리 지점의 heading을 정렬 목표로 사용
      rotate_to_heading_angular_vel: 1.0   # rad/s (MPPI wz_max와 통일)
      max_angular_accel: 3.2               # rad/s^2 (velocity_smoother와 통일)
      simulate_ahead_time: 1.0             # sec. 회전 중 충돌 예측 시간
      rotate_to_goal_heading: true         # goal 최종 yaw도 제자리 회전으로 정렬 

      # --- 이하 primary controller(MPPI) 파라미터 ---
      time_steps: 28
      model_dt: 0.1                   # sec
      batch_size: 3000

      # Velocity noise for sampling
      vx_std: 0.3                     # m/s
      vy_std: 0.0                     # m/s
      wz_std: 0.3                     # rad/s

      # Velocity limits
      vx_max: 0.5                     # m/s
      vx_min: -0.35                   # m/s  (REEDS_SHEPP 후진 path 실행 위해 확장)
      vy_max: 0.0                     # m/s  (Ackermann body-y = 0)
      wz_max: 1.0                     # rad/s (Ackermann 구속: vx_max/min_turning_r = 1.0)

      # Acceleration limits
      ax_max: 2.0                     # m/s^2
      ax_min: -2.0                    # m/s^2
      ay_max: 0.0                     # m/s^2
      ay_min: 0.0                     # m/s^2

      temperature: 0.3
      motion_model: "Ackermann"
      min_turning_r: 0.5              # m  (실제 0.476 + 2.4cm 안전 마진)
      prune_distance: 4.0             # m
      visualize: true
      publish_optimal_trajectory: true
      reset_period: 1.0               # sec
      regenerate_noises: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.5 # sec
        consider_footprint: false

      # MPPI Critics - Cost functions for trajectory evaluation
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic"
                , "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"
      ]

      # Ensures velocity/acceleration constraints
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      # Penalizes distance from goal
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 0.5    # m

      # Penalizes orientation error at goal
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5    # m

      # Prefers forward motion over backward (REEDS_SHEPP path 실행 위해 완화)
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0              
        threshold_to_consider: 0.5    # m

      # Penalizes trajectories through high-cost areas
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0
        critical_cost: 100.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0       # m
        trajectory_point_step: 2

      # Encourages alignment with global path
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4

      # Encourages following the global path
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 30
        threshold_to_consider: 1.4    # m

      # Penalizes deviation from path angle
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5    # m

# -----------------------------------------------------------------------------
# Local Costmap - Rolling window costmap for local planning
# -----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0          # Hz
      publish_frequency: 2.0          # Hz
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 16                       # m
      height: 16                      # m
      resolution: 0.1                 # m/cell
      robot_radius: 0.3               # m
      transform_tolerance: 0.5        # sec
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Inflation layer - Expands obstacles for safety margin
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.5         # m  (global과 통일)

      # Obstacle layer - Isaac Sim RTX LiDAR PointCloud2
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: pointcloud
        pointcloud:
          topic: /velodyne_points
          data_type: "PointCloud2"
          clearing: True
          marking: True
          # PointCloud2 높이 필터: 지면/천장 포인트 제거
          min_obstacle_height: 0.25   # m
          max_obstacle_height: 1.0    # m
          raytrace_max_range: 8.5     # m
          raytrace_min_range: 0.0     # m
          obstacle_max_range: 8.0     # m
          obstacle_min_range: 0.5     # m  차체 self-hit 컷 (Ranger Mini 3 후방 모서리 0.46m + 마진)

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

# -----------------------------------------------------------------------------
# Global Costmap - Full map costmap for global planning
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0           # Hz
      publish_frequency: 1.0          # Hz
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.3               # m
      resolution: 0.05                # m/cell
      track_unknown_space: true
      transform_tolerance: 0.5        # sec
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Obstacle layer - Isaac Sim RTX LiDAR PointCloud2
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: pointcloud
        pointcloud:
          topic: /velodyne_points
          data_type: "PointCloud2"
          clearing: True
          marking: True
          # PointCloud2 높이 필터: 지면/천장 포인트 제거
          min_obstacle_height: 0.35   # m
          max_obstacle_height: 1.0    # m
          raytrace_max_range: 8.3     # m
          raytrace_min_range: 0.0     # m
          obstacle_max_range: 7.5     # m
          obstacle_min_range: 0.5     # m  차체 self-hit 컷 (Ranger Mini 3 후방 모서리 0.46m + 마진)

      # Static layer - Pre-built map
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # Inflation layer - Safety margin around obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.5      # global은 완만 (장애물에서 여유 있게)
        inflation_radius: 0.5         # m
      always_send_full_costmap: True

# -----------------------------------------------------------------------------
# Planner Server - Global path planning
# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0   # Hz
    planner_plugins: ["GridBased"]
    # Humble #4111(TF 깨짐) 보고된 이슈 있으므로 동작 모니터링 필수.
    # 문제 발생 시 motion_model_for_search를 다시 "DUBIN"으로 복귀.
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5                       # m
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.5          # m  (MPPI min_turning_r과 동일)
      analytic_expansion_max_length: 2.5   # m  (>= 5x min_turning_r)
      reverse_penalty: 2.0                 # 후진 cost 가중치 (불필요한 후진 억제)



# -----------------------------------------------------------------------------
# Smoother Server - Smooths planned paths
# -----------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# -----------------------------------------------------------------------------
# Behavior Server - Recovery behaviors when navigation fails
# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0             # Hz
    # ranger_base 드라이버가 pure rotation (vx≈0, |wz|>0) 명령을 받으면
    # force_ackermann_mode 와 무관하게 SPINNING 모드로 전환해서 처리함.
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5          # sec
    simulate_ahead_time: 2.0          # sec
    max_rotational_vel: 1.0           # rad/s
    min_rotational_vel: 0.4           # rad/s
    rotational_acc_lim: 3.2           # rad/s^2

# -----------------------------------------------------------------------------
# Waypoint Follower - Follows sequence of waypoints
# -----------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    loop_rate: 20                     # Hz
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200    # ms

# -----------------------------------------------------------------------------
# Velocity Smoother - Smooths velocity commands
# -----------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0         # Hz
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]     # [x, y, theta] m/s, rad/s
    min_velocity: [-0.5, 0.0, -1.0]   # [x, y, theta] m/s, rad/s
    max_accel: [2.0, 0.0, 3.2]        # [x, y, theta] m/s^2, rad/s^2  (MPPI ax_max와 통일)
    max_decel: [-2.0, 0.0, -3.2]      # [x, y, theta] m/s^2, rad/s^2
    odom_topic: "/odometry/imu"
    odom_duration: 0.1                # sec
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0             # sec

# -----------------------------------------------------------------------------
# Collision Monitor - Real-time collision avoidance
# -----------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    enabled: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2          # sec
    source_timeout: 1.0               # sec
    base_shift_correction: True
    stop_pub_timeout: 2.0             # sec

    polygons: ["StopZone", "SlowZone"]

    # Stop zone (전방) — 즉시 정지
    # 시작 x=0.0 (base_link): 차체/blind 영역은 어차피 min_range=0.5로 점이 안 박힘 → 폴리곤 단순화
    # 종료 x=0.80: 차체 front(0.37) + 정지거리(0.11m) + 충분한 반응 마진
    # 너비 ±0.40: 차체(±0.25) + 측면 통과 obstacle 대비 마진 0.15m
    StopZone:
      type: "polygon"
      points: [0.80, 0.40, 0.80, -0.40, 0.0, -0.40, 0.0, 0.40]  # m
      action_type: "stop"
      min_points: 1                  # stop은 최대 민감도 유지 (의도적)
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True

    # Slowdown zone (전방) — 감속
    # 시작 x=0.0 (base_link): StopZone과 동일 (min_range=0.5로 blind 영역 자동 컷)
    # 너비 ±0.55: 측면 통과 obstacle 사전 인지 (stop 진입 전 감속 시작)
    SlowZone:
      type: "polygon"
      points: [1.25, 0.55, 1.25, -0.55, 0.0, -0.55, 0.0, 0.55]  # m
      action_type: "slowdown"
      min_points: 2                  # 단일 노이즈 점에 의한 감속 트리거 방지
      slowdown_ratio: 0.5
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True

    observation_sources: ["pointcloud"]
    pointcloud:
      type: "pointcloud"
      topic: "/velodyne_points"
      min_height: 0.1                # m
      max_height: 2.0                # m
      enabled: True
