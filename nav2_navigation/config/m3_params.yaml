# =============================================================================
# Nav2 Parameters for ISR M3 Robot Navigation
# =============================================================================

# -----------------------------------------------------------------------------
# Behavior Tree Navigator - Manages navigation behavior tree execution
# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/imu
    bt_loop_duration: 10              # ms
    default_server_timeout: 20        # sec
    wait_for_service_timeout: 1000    # ms

# -----------------------------------------------------------------------------
# Controller Server - Executes local trajectory tracking
# -----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    controller_frequency: 10.0          # Hz
    min_x_velocity_threshold: 0.001     # m/s
    min_y_velocity_threshold: 0.5       # m/s
    min_theta_velocity_threshold: 0.001 # rad/s
    failure_tolerance: 0.3              # sec
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker - Detects if robot is stuck
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3   # m
      movement_time_allowance: 15.0   # sec

    # Goal checker - Determines when goal is reached
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25         # m
      yaw_goal_tolerance: 0.25        # rad

    # MPPI Controller - Model Predictive Path Integral controller
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 28
      model_dt: 0.1                   # sec
      batch_size: 3000

      # Velocity noise for sampling
      vx_std: 0.3                     # m/s
      vy_std: 0.0                     # m/s
      wz_std: 0.3                     # rad/s

      # Velocity limits
      vx_max: 0.5                     # m/s
      vx_min: -0.35                   # m/s
      vy_max: 0.0                     # m/s
      wz_max: 3.0                     # rad/s

      # Acceleration limits
      ax_max: 2.0                     # m/s^2
      ax_min: -2.0                    # m/s^2
      ay_max: 0.0                     # m/s^2
      ay_min: 0.0                     # m/s^2

      temperature: 0.3
      motion_model: "DiffDrive"
      prune_distance: 4.0             # m
      visualize: true
      publish_optimal_trajectory: true
      reset_period: 1.0               # sec
      regenerate_noises: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.5 # sec
        consider_footprint: false

      # MPPI Critics - Cost functions for trajectory evaluation
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic"
                , "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"
      ]

      # Ensures velocity/acceleration constraints
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      # Penalizes distance from goal
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 0.5    # m

      # Penalizes orientation error at goal
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5    # m

      # Prefers forward motion over backward
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        threshold_to_consider: 0.5    # m

      # Penalizes trajectories through high-cost areas
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0
        critical_cost: 100.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0       # m
        trajectory_point_step: 2

      # Encourages alignment with global path
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4

      # Encourages following the global path
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 30
        threshold_to_consider: 1.4    # m

      # Penalizes deviation from path angle
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5    # m

# -----------------------------------------------------------------------------
# Local Costmap - Rolling window costmap for local planning
# -----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0          # Hz
      publish_frequency: 2.0          # Hz
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 16                       # m
      height: 16                      # m
      resolution: 0.1                 # m/cell
      robot_radius: 0.3               # m
      transform_tolerance: 0.5        # sec
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      # Inflation layer - Expands obstacles for safety margin
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.85        # m

      # Voxel layer - 3D obstacle detection from sensor data
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0                 # m
        z_resolution: 0.05            # m
        z_voxels: 16
        max_obstacle_height: 2.0      # m
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0    # m
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.5     # m
          raytrace_min_range: 0.0     # m
          obstacle_max_range: 8.0     # m
          obstacle_min_range: 0.0     # m

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

# -----------------------------------------------------------------------------
# Global Costmap - Full map costmap for global planning
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0           # Hz
      publish_frequency: 1.0          # Hz
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.3               # m
      resolution: 0.05                # m/cell
      track_unknown_space: true
      transform_tolerance: 0.5        # sec
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Obstacle layer - Dynamic obstacle detection
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0    # m
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.3     # m
          raytrace_min_range: 0.0     # m
          obstacle_max_range: 7.5     # m
          obstacle_min_range: 0.0     # m

      # Static layer - Pre-built map
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # Inflation layer - Safety margin around obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.5
        inflation_radius: 0.5         # m
      always_send_full_costmap: True

# -----------------------------------------------------------------------------
# Planner Server - Global path planning (A* algorithm)
# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0   # Hz
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5                  # m
      use_astar: true
      allow_unknown: true

# -----------------------------------------------------------------------------
# Smoother Server - Smooths planned paths
# -----------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# -----------------------------------------------------------------------------
# Behavior Server - Recovery behaviors when navigation fails
# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0             # Hz
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5          # sec
    simulate_ahead_time: 2.0          # sec
    max_rotational_vel: 1.0           # rad/s
    min_rotational_vel: 0.4           # rad/s
    rotational_acc_lim: 3.2           # rad/s^2

# -----------------------------------------------------------------------------
# Waypoint Follower - Follows sequence of waypoints
# -----------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    loop_rate: 20                     # Hz
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200    # ms

# -----------------------------------------------------------------------------
# Velocity Smoother - Smooths velocity commands
# -----------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0         # Hz
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]     # [x, y, theta] m/s, rad/s
    min_velocity: [-0.5, 0.0, -1.0]   # [x, y, theta] m/s, rad/s
    max_accel: [2.5, 0.0, 3.2]        # [x, y, theta] m/s^2, rad/s^2
    max_decel: [-2.5, 0.0, -3.2]      # [x, y, theta] m/s^2, rad/s^2
    odom_topic: "odometry/imu"
    odom_duration: 0.1                # sec
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0             # sec

# -----------------------------------------------------------------------------
# Collision Monitor - Real-time collision avoidance
# -----------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    enabled: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2          # sec
    source_timeout: 1.0               # sec
    base_shift_correction: True
    stop_pub_timeout: 2.0             # sec

    polygons: ["StopCircle", "SlowCircle"]

    # Stop zone - Immediately stops robot if obstacle detected
    StopCircle:
      type: "polygon"
      points: [0.3, 0.4, 0.3, -0.4, 0.0, -0.4, 0.0, 0.4]  # m
      action_type: "stop"
      min_points: 1
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True

    # Slowdown zone - Reduces speed when obstacle approaches
    SlowCircle:
      type: "polygon"
      points: [1.2, 0.5, 1.2, -0.5, 0.0, -0.5, 0.0, 0.5]  # m
      action_type: "slowdown"
      min_points: 1
      slowdown_ratio: 0.5
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: True
